[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@fhenixprotocol/=lib/cofhe-contracts/src/",
    "@uniswap/v4-core/=lib/v4-core/",
    "@v4-periphery/=lib/v4-periphery/src/",
    "forge-std/=lib/forge-std/src/"
]

solc_version = '0.8.26'
evm_version = "cancun"
optimizer = true
optimizer_runs = 1000000
via_ir = true
ffi = true
isolate = true  # Required for proper FHE permission checks

# RPC endpoints
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
fhenix = "${FHENIX_COPROCESSOR_RPC}"

# Etherscan configuration for contract verification
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
